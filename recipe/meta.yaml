{% set name = "fsleyes-plugin-mrs" %}
{% set version = "0.1.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 1ce7e43f6dcebe3e77cac83d6122c4111b6f89b1a0afc500243b1192311887ab

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - fsleyes >=1.17.0,<2.0
    - fsleyes-widgets >=0.16.0,<1.0
    - fsleyes-props >=1.12,<2.0
    - fslpy >=3.9,<4.0
    - file-tree >=1.6.1,<2.0
    - matplotlib-base >=3.5,<4.0
    - nifti-mrs >=1.3.2,<2.0
    - numpy >=1.14,<3.0
    - seaborn >=0.12.0,<1.0
    - wxpython >=4,<5.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - fsleyes_plugin_mrs

about:
  home: https://git.fmrib.ox.ac.uk/wclarke/fsleyes-plugin-mrs
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: An FSLeyes extension for viewing MRS(I) data formatted as NIfTI-MRS.
  # The remaining entries in this section are optional, but recommended.
  description: |
    This plugin adds an additional MRS specific view panel to FSLeyes which displays spectra in the frequency domain. Higher dimensions of data stored in NIfTI-MRS format may be explored.
  dev_url: https://git.fmrib.ox.ac.uk/wclarke/fsleyes-plugin-mrs

extra:
  recipe-maintainers:
    - vkarlaftis
    - wtclarke
